name: Deploy Backend to Cloud Run

on:
  push:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy (dev | staging | prod)'
        required: true
        default: 'dev'

env:
  # 根据分支或手动输入动态设置（ Junior 可按需修改）
  GCP_REGION: asia-east1
  SERVICE_NAME: gpt-jobs-api

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine environment
        id: env
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target=${{ github.event.inputs.environment }}" >> "$GITHUB_OUTPUT"
          elif [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "target=prod" >> "$GITHUB_OUTPUT"
          else
            echo "target=staging" >> "$GITHUB_OUTPUT"
          fi

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}

      - name: Build & Push Container Image
        run: |
          IMAGE_TAG=asia-east1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/cloudrun/${{ env.SERVICE_NAME }}:${{ github.sha }}
          gcloud builds submit . \
            --tag $IMAGE_TAG \
            --project ${{ secrets.GCP_PROJECT_ID }}
          echo "IMAGE_TAG=$IMAGE_TAG" >> "$GITHUB_ENV"

      - name: Deploy to Cloud Run
        run: |
          ENV_VARS="NODE_ENV=${{ steps.env.outputs.target }},FIREBASE_PROJECT_ID=${{ secrets.GCP_PROJECT_ID }}"
          gcloud run deploy ${{ env.SERVICE_NAME }} \
            --image ${{ env.IMAGE_TAG }} \
            --region ${{ env.GCP_REGION }} \
            --platform managed \
            --allow-unauthenticated \
            --set-env-vars "$ENV_VARS" \
            --max-instances 10 \
            --memory 512Mi \
            --cpu 1 \
            --timeout 300 \
            --project ${{ secrets.GCP_PROJECT_ID }}

      - name: Smoke Test
        run: |
          URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} --region ${{ env.GCP_REGION }} --format 'value(status.url)')
          echo "Service URL: $URL"
          curl -sf "$URL/health" || exit 1
