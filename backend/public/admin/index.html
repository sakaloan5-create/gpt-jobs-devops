<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GPTJobs 管理后台</title>
<script src="./tw-cdn.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: { sans: ['Inter','sans-serif'] },
      colors: {
        slate: { 50:'#f8fafc', 100:'#f1f5f9', 200:'#e2e8f0', 300:'#cbd5e1', 400:'#94a3b8', 500:'#64748b', 600:'#475569', 700:'#334155', 800:'#1e293b', 900:'#0f172a' },
        primary: { 50:'#eff6ff', 100:'#dbeafe', 500:'#3b82f6', 600:'#2563eb', 700:'#1d4ed8' },
      }
    }
  }
}
</script>
<style>
  html, body { height: 100%; background-color: #f8fafc; color: #334155; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; animation: fadeIn 0.2s ease-out forwards; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* Sidebar */
  .sidebar-link {
    display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem;
    border-radius: 0.375rem; color: #94a3b8; font-size: 0.875rem; font-weight: 500;
    cursor: pointer; transition: all 0.15s ease;
  }
  .sidebar-link:hover { color: #f8fafc; background: rgba(255, 255, 255, 0.05); }
  .sidebar-link.active { color: #ffffff; background: rgba(255, 255, 255, 0.1); font-weight: 600; }

  /* Modal */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(2px);
    display: none; align-items: center; justify-content: center; z-index: 50;
    opacity: 0; transition: opacity 0.2s ease;
  }
  .modal-overlay.open { display: flex; opacity: 1; }
  .modal-content {
    background: #ffffff; border-radius: 0.75rem; box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
    transform: scale(0.98); transition: transform 0.2s ease;
  }
  .modal-overlay.open .modal-content { transform: scale(1); }

  /* Inputs */
  input, select, textarea {
    background: #ffffff; border: 1px solid #cbd5e1; color: #334155;
    border-radius: 0.5rem; transition: all 0.15s ease;
  }
  input:focus, select:focus, textarea:focus {
    border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15) !important; outline: none;
  }

  /* Buttons */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem;
    font-size: 0.875rem; font-weight: 500; padding: 0.5rem 1rem; border-radius: 0.375rem;
    transition: all 0.15s ease; cursor: pointer;
  }
  .btn-primary { background-color: #2563eb; color: #ffffff; border: 1px solid #2563eb; }
  .btn-primary:hover { background-color: #1d4ed8; }
  .btn-secondary { background-color: #ffffff; color: #475569; border: 1px solid #cbd5e1; }
  .btn-secondary:hover { background-color: #f8fafc; border-color: #94a3b8; }
  .btn-danger { background-color: #ffffff; color: #ef4444; border: 1px solid #fca5a5; }
  .btn-danger:hover { background-color: #fef2f2; border-color: #ef4444; }

  /* Badges */
  .badge { padding: 0.125rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
  .badge-green { background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
  .badge-yellow { background: #fef9c3; color: #854d0e; border: 1px solid #fef08a; }
  .badge-red { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
  .badge-gray { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

  /* Toast */
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 60;
    background: #1e293b; color: #ffffff; border-radius: 0.5rem;
    transform: translateY(150%); transition: transform 0.3s ease;
  }
  .toast.show { transform: translateY(0); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
</style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-sm">

  <!-- Top Navigation (SaaS style) -->
  <header class="h-14 bg-slate-900 text-white flex items-center justify-between px-6 shrink-0 border-b border-slate-800">
    <div class="flex items-center gap-2">
      <span class="font-semibold text-base tracking-tight">GPTJobs 管理后台</span>
    </div>
    <div class="flex items-center gap-4 text-slate-300">
      <div class="flex items-center gap-2">
         <span class="w-2 h-2 rounded-full bg-green-400"></span>
         <span class="text-xs font-medium">系统运行正常</span>
      </div>
      <div class="w-px h-5 bg-slate-700"></div>
      <div class="w-7 h-7 bg-slate-800 rounded-full flex items-center justify-center text-xs font-bold border border-slate-700">A</div>
    </div>
  </header>

  <div class="flex flex-1 overflow-hidden">
    <!-- Sidebar -->
    <aside class="w-60 bg-slate-900 border-r border-slate-800 flex flex-col pt-4 pb-4">
      <nav class="flex-1 px-3 space-y-1">
        <div class="sidebar-link active" data-tab="review" >
          <span>审核中心</span>
          <span id="badge-review" class="ml-auto hidden min-w-[1.25rem] h-5 rounded-full bg-blue-600 text-white text-[10px] font-bold flex items-center justify-center">0</span>
        </div>
        <div class="sidebar-link" data-tab="jobs" >
          <span>岗位管理</span>
        </div>
        <div class="sidebar-link" data-tab="reports" >
          <span>举报处理</span>
          <span id="badge-reports" class="ml-auto hidden min-w-[1.25rem] h-5 rounded-full bg-rose-600 text-white text-[10px] font-bold flex items-center justify-center">0</span>
        </div>
        <div class="mt-6 mb-2 px-3 text-xs font-semibold text-slate-500 uppercase tracking-widest">设置</div>
        <div class="sidebar-link" data-tab="config" >
          <span>应用配置</span>
        </div>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 bg-slate-50 flex flex-col overflow-hidden">
       <!-- Header Banner -->
      <div class="bg-white border-b border-slate-200 px-8 py-5 shrink-0 flex items-center justify-between">
        <div>
          <h1 id="pageTitle" class="text-xl font-semibold text-slate-900">审核中心</h1>
          <p id="pageSubtitle" class="text-sm text-slate-500 mt-1">管理招聘方提交的待审核岗位。</p>
        </div>
        <div id="headerActions"></div>
      </div>

      <!-- scrollable content -->
      <div class="flex-1 overflow-auto p-8">

        <!-- REVIEW PANEL -->
        <div id="panel-review" class="tab-panel active">
          <div class="bg-white border border-slate-200 rounded-lg shadow-sm">
             <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center rounded-t-lg">
                <span class="font-medium text-slate-800">待审核列表</span>
                <span id="reviewStat" class="text-xs font-medium text-slate-500">0 条</span>
             </div>
             <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                  <tr>
                    <th class="px-6 py-3 font-medium">岗位 / 公司</th>
                    <th class="px-6 py-3 font-medium">地区</th>
                    <th class="px-6 py-3 font-medium">薪资</th>
                    <th class="px-6 py-3 font-medium">提交时间</th>
                    <th class="px-6 py-3 font-medium text-right">操作</th>
                  </tr>
                </thead>
                <tbody id="reviewTable" class="divide-y divide-slate-100 bg-white"></tbody>
             </table>
             <div id="reviewEmpty" class="hidden py-16 text-center text-slate-400">暂无待审核岗位</div>
          </div>
        </div>

        <!-- JOBS PANEL -->
        <div id="panel-jobs" class="tab-panel">
           <!-- Filters -->
           <div class="bg-white border border-slate-200 rounded-lg shadow-sm p-4 mb-6 flex flex-wrap items-center gap-4">
              <div class="relative w-64">
                <input id="jobSearch" type="text" placeholder="搜索岗位或公司名称..." class="w-full pl-3 pr-4 py-2 border border-slate-300 rounded-md text-sm">
              </div>
              <select id="jobFilterCountry" class="py-2 px-3 border border-slate-300 rounded-md text-sm text-slate-700 w-32"></select>
              <select id="jobFilterStatus" class="py-2 px-3 border border-slate-300 rounded-md text-sm text-slate-700 w-32">
                <option value="">全部状态</option>
                <option value="active">已通过</option>
                <option value="pending">待审核</option>
                <option value="banned">已封禁</option>
                <option value="rejected">已拒绝</option>
              </select>
              <div class="flex-1"></div>
              <button onclick="App.openJobModal()" class="btn btn-primary shadow-sm">+ 新增岗位</button>
           </div>

           <div class="bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden">
             <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                  <tr>
                    <th class="px-6 py-3 font-medium">岗位信息</th>
                    <th class="px-6 py-3 font-medium">地点</th>
                    <th class="px-6 py-3 font-medium">状态</th>
                    <th class="px-6 py-3 font-medium text-right">设置</th>
                  </tr>
                </thead>
                <tbody id="jobTable" class="divide-y divide-slate-100 bg-white"></tbody>
             </table>
             <div id="jobEmpty" class="hidden py-16 text-center text-slate-400">没有符合条件的岗位</div>
           </div>
        </div>

        <!-- REPORTS PANEL -->
        <div id="panel-reports" class="tab-panel">
          <div class="bg-white border border-slate-200 rounded-lg shadow-sm">
             <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center rounded-t-lg">
                <span class="font-medium text-slate-800">举报队列</span>
                <div class="flex gap-2">
                  <button onclick="App.setReportFilter('')" class="report-filter-btn px-3 py-1 rounded text-xs font-medium bg-slate-200 text-slate-800" data-filter="">全部</button>
                  <button onclick="App.setReportFilter('pending')" class="report-filter-btn px-3 py-1 rounded text-xs font-medium text-slate-600 hover:bg-slate-100" data-filter="pending">待处理</button>
                  <button onclick="App.setReportFilter('resolved')" class="report-filter-btn px-3 py-1 rounded text-xs font-medium text-slate-600 hover:bg-slate-100" data-filter="resolved">已处理</button>
                </div>
             </div>
             <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                  <tr>
                    <th class="px-6 py-3 font-medium">类型</th>
                    <th class="px-6 py-3 font-medium">详情</th>
                    <th class="px-6 py-3 font-medium">关联 ID</th>
                    <th class="px-6 py-3 font-medium">状态</th>
                    <th class="px-6 py-3 font-medium text-right">处理</th>
                  </tr>
                </thead>
                <tbody id="reportTable" class="divide-y divide-slate-100 bg-white"></tbody>
             </table>
             <div id="reportEmpty" class="hidden py-16 text-center text-slate-400">暂无举报记录</div>
          </div>
        </div>

        <!-- COUNTRIES -->
        <div id="panel-countries" class="tab-panel">
           <div class="mb-4 flex justify-between items-center">
             <div class="text-slate-500">配置地区与货币回退规则。</div>
             <button onclick="App.openCountryModal()" class="btn btn-secondary shadow-sm">添加地区</button>
           </div>
           <div class="bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden">
             <table class="w-full text-left">
                <thead class="bg-slate-50 text-slate-500 text-xs uppercase tracking-wider border-b border-slate-200">
                  <tr>
                    <th class="px-6 py-3 font-medium">ISO</th>
                    <th class="px-6 py-3 font-medium">名称</th>
                    <th class="px-6 py-3 font-medium">货币</th>
                    <th class="px-6 py-3 font-medium">回退顺序</th>
                    <th class="px-6 py-3 font-medium text-right">操作</th>
                  </tr>
                </thead>
                <tbody id="countryTable" class="divide-y divide-slate-100 bg-white"></tbody>
             </table>
           </div>
        </div>

        <!-- CONFIG -->
        <div id="panel-config" class="tab-panel">
          <div class="max-w-3xl">
             <form id="configForm" class="bg-white border border-slate-200 rounded-lg shadow-sm">
               <div class="p-6 border-b border-slate-100">
                  <h3 class="font-medium text-slate-800 mb-4">功能开关</h3>
                  <div class="flex flex-col gap-4">
                    <label class="flex items-center gap-3 cursor-pointer group">
                      <input type="checkbox" id="cfgSearch" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                      <span class="text-slate-700 group-hover:text-slate-900">搜索功能</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                      <input type="checkbox" id="cfgFilter" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                      <span class="text-slate-700 group-hover:text-slate-900">高级筛选</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                      <input type="checkbox" id="cfgContact" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                      <span class="text-slate-700 group-hover:text-slate-900">直接联系</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                      <input type="checkbox" id="cfgReport" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                      <span class="text-slate-700 group-hover:text-slate-900">举报功能</span>
                    </label>
                    <label class="flex items-center gap-3 cursor-pointer group">
                      <input type="checkbox" id="cfgShare" class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500">
                      <span class="text-slate-700 group-hover:text-slate-900">社交分享</span>
                    </label>
                  </div>
               </div>
               <div class="p-6">
                 <h3 class="font-medium text-slate-800 mb-4">应用版本</h3>
                 <input id="cfgVersion" class="w-64 border border-slate-300 rounded-md px-3 py-2 text-sm text-slate-700">
               </div>
               <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end rounded-b-lg">
                  <button type="submit" class="btn btn-primary shadow-sm">保存配置</button>
               </div>
             </form>
          </div>
        </div>

      </div>
    </main>
  </div>

  <!-- MODALS -->
  <div id="jobModal" class="modal-overlay">
    <div class="modal-content w-full max-w-4xl max-h-[90vh] flex flex-col">
       <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
         <h2 id="jobModalTitle" class="text-lg font-semibold text-slate-800">岗位详情</h2>
         <button onclick="App.closeJobModal()" class="text-slate-400 hover:text-slate-600 text-xl">×</button>
       </div>
       <div class="p-6 overflow-y-auto flex-1">
         <form id="jobForm" class="space-y-6">
            <input type="hidden" id="jobId">
            <div class="grid grid-cols-2 gap-x-6 gap-y-5">
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">岗位名称 <span class="text-red-500">*</span></label>
                <input id="jobTitle" required class="w-full px-3 py-2">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">公司名称 <span class="text-red-500">*</span></label>
                <input id="jobCompany" required class="w-full px-3 py-2">
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div class="relative">
                  <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">国家 <span class="text-red-500">*</span></label>
                  <input type="text" id="jobCountrySearch" class="w-full px-3 py-2" placeholder="搜索国家..." autocomplete="off">
                  <input type="hidden" id="jobCountry" required>
                  <div id="countryDropdown" class="hidden absolute z-50 bg-white border border-slate-300 rounded-md shadow-lg max-h-48 overflow-y-auto w-full mt-1"></div>
                </div>
                <div>
                  <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">城市</label>
                  <input id="jobCity" class="w-full px-3 py-2" placeholder="可选">
                </div>
              </div>
               <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">薪资 <span class="text-red-500">*</span></label>
                <input id="jobSalary" required class="w-full px-3 py-2" placeholder="如：35k-50k 或 $5000/month">
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">工作类型</label>
                <select id="jobType" class="w-full px-3 py-2"><option value="Part-time">兼职</option><option value="Full-time">全职</option><option value="Contract">合同</option></select>
              </div>
               <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">联系平台</label>
                <select id="jobPlatform" class="w-full px-3 py-2"><option value="whatsapp">WhatsApp</option><option value="telegram">Telegram</option><option value="email">邮件</option><option value="external_url">外部链接</option></select>
              </div>
              <div class="col-span-2">
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">联系链接 <span class="text-red-500">*</span></label>
                <input id="jobLink" required class="w-full px-3 py-2 text-blue-600">
              </div>
            </div>
            <div>
              <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">详细描述 <span class="text-red-500">*</span></label>
              <textarea id="jobDesc" rows="3" required class="w-full px-3 py-2 text-sm"></textarea>
            </div>
            <div class="grid grid-cols-2 gap-6">
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">岗位要求</label>
                <textarea id="jobReqs" rows="4" class="w-full px-3 py-2 text-sm text-slate-600"></textarea>
              </div>
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">岗位职责</label>
                <textarea id="jobResp" rows="4" class="w-full px-3 py-2 text-sm text-slate-600"></textarea>
              </div>
            </div>
             <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase tracking-wide">标签（逗号分隔）</label>
                <input id="jobTags" class="w-full px-3 py-2 text-sm">
            </div>
         </form>
       </div>
       <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3 rounded-b-lg">
          <button type="button" onclick="App.closeJobModal()" class="btn btn-secondary shadow-sm">取消</button>
          <button type="button" onclick="App.submitJob()" class="btn btn-primary shadow-sm">保存</button>
       </div>
    </div>
  </div>

   <div id="countryModal" class="modal-overlay">
    <div class="modal-content w-full max-w-lg flex flex-col">
       <div class="px-6 py-4 border-b border-slate-200 flex justify-between items-center">
         <h2 id="countryModalTitle" class="text-lg font-semibold text-slate-800">地区配置</h2>
         <button onclick="App.closeCountryModal()" class="text-slate-400 hover:text-slate-600 text-xl">×</button>
       </div>
       <div class="p-6 overflow-y-auto">
         <form id="countryForm" class="space-y-5">
            <div class="grid grid-cols-2 gap-y-4 gap-x-5">
              <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase">ISO 代码 <span class="text-red-500">*</span></label>
                <input type="hidden" id="countryCodeOrig">
                <input id="countryCode" required class="w-full px-3 py-2 uppercase">
              </div>
               <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase">名称 <span class="text-red-500">*</span></label>
                <input id="countryName" required class="w-full px-3 py-2">
              </div>
               <div>
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase">货币</label>
                <input id="countryCurrency" class="w-full px-3 py-2">
              </div>
              <div class="col-span-2">
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase">支持链接</label>
                <input id="countrySupport" class="w-full px-3 py-2">
              </div>
              <div class="col-span-2">
                <label class="block text-xs font-semibold text-slate-600 mb-1.5 uppercase">回退顺序（逗号分隔）</label>
                <input id="countryFallback" class="w-full px-3 py-2 uppercase placeholder-slate-400" placeholder="例如：BR,PH">
              </div>
            </div>
         </form>
       </div>
       <div class="px-6 py-4 bg-slate-50 border-t border-slate-200 flex justify-end gap-3 rounded-b-lg">
          <button type="button" onclick="App.closeCountryModal()" class="btn btn-secondary shadow-sm">取消</button>
          <button type="button" onclick="App.submitCountry()" class="btn btn-primary shadow-sm">保存配置</button>
       </div>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast p-4 flex items-center shadow-lg border border-slate-700">
    <span id="toastMsg" class="font-medium text-sm">操作成功</span>
  </div>

<script>
const App = (() => {
  const API_BASE = '/api';
  let state = { pendingJobs:[], reports:[], jobs:[], countries:[], reportFilter:'', currentTab:'review', toastTimer:null };
  const el = id => document.getElementById(id);
  const escapeHTML = str => { if(!str)return''; const d=document.createElement('div'); d.innerText=str; return d.innerHTML; };

  const showToast = (msg, type = 'success') => {
    const t = el('toast'); el('toastMsg').textContent = msg;
    t.classList.add('show'); clearTimeout(state.toastTimer); state.toastTimer = setTimeout(()=>t.classList.remove('show'), 3000);
  };
  const apiFetch = async (path, opts={}) => {
    try { const res = await fetch(API_BASE+path, { headers:{'Content-Type':'application/json'}, ...opts});
      const data = await res.json().catch(()=>({})); if(!res.ok){showToast(data.message||'请求失败','error');throw new Error();} return data;
    } catch(e){ console.error(e);throw e; }
  };

  const switchTab = (name) => {
    state.currentTab = name;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active')); el(`panel-${name}`).classList.add('active');
    document.querySelectorAll('.sidebar-link').forEach(l => l.classList.remove('active')); document.querySelector(`.sidebar-link[data-tab="${name}"]`)?.classList.add('active');
    const t = { review:{t:'审核中心',s:'管理招聘方提交的待审核岗位。'}, jobs:{t:'岗位管理',s:'查看和管理所有已发布及待审核的岗位。'}, reports:{t:'举报处理',s:'处理用户提交的内容举报。'}, countries:{t:'国家配置',s:'配置系统支持的地区与货币回退规则。'}, config:{t:'应用配置',s:'管理客户端功能开关。'}};
    el('pageTitle').textContent = t[name].t; el('pageSubtitle').textContent = t[name].s;
    const loaders = { review: loadReview, reports: loadReports, jobs: loadJobs, countries: loadCountries, config: loadConfig };
    if(loaders[name]) loaders[name]().catch(()=>{});
  };

  const updateBadge = (id, count) => { const b=el(id); b.textContent=count>99?'99+':count; count>0?b.classList.remove('hidden'):b.classList.add('hidden'); };

  /* Reviews */
  const loadReview = async () => {
    const res = await apiFetch('/admin/jobs?status=pending&page_size=100'); state.pendingJobs = res.data?.list||[];
    updateBadge('badge-review', state.pendingJobs.length); el('reviewStat').textContent = `${state.pendingJobs.length} 条待处理`;
    const tb = el('reviewTable'); if(!state.pendingJobs.length){ tb.innerHTML=''; el('reviewEmpty').classList.remove('hidden'); return; }
    el('reviewEmpty').classList.add('hidden');
    tb.innerHTML = state.pendingJobs.map(j => `
      <tr class="hover:bg-slate-50 transition">
        <td class="px-6 py-4"><p class="font-medium text-slate-800">${escapeHTML(j.title)}</p><p class="text-slate-500 text-xs mt-0.5">${escapeHTML(j.company_name)}</p></td>
        <td class="px-6 py-4"><span class="badge badge-gray mr-1">${escapeHTML(j.country)}</span> <span class="text-slate-600">${escapeHTML(j.city)}</span></td>
        <td class="px-6 py-4 text-slate-700">${escapeHTML(j.salary)}</td>
        <td class="px-6 py-4 text-slate-500 text-xs">${j.created_at ? j.created_at.slice(0,16).replace('T',' ') : '-'}</td>
        <td class="px-6 py-4 text-right">
           <button onclick="App.reviewAction('${j.id}','approve')" class="btn btn-secondary !px-2 !py-1 text-xs hover:!text-green-600 hover:!border-green-200">通过</button>
           <button onclick="App.reviewAction('${j.id}','reject')" class="btn btn-secondary !px-2 !py-1 text-xs hover:!text-amber-600 hover:!border-amber-200">拒绝</button>
           <button onclick="App.reviewAction('${j.id}','ban')" class="btn btn-secondary !px-2 !py-1 text-xs hover:!text-red-600 hover:!border-red-200 hover:!bg-red-50">封禁</button>
        </td>
      </tr>
    `).join('');
  };
  const reviewAction = async (id, act) => {
    if(!confirm(`确认执行「${act}」操作？`)) return;
    await apiFetch(`/admin/jobs/${id}/review`, {method:'PATCH',body:JSON.stringify({action:act})});
    showToast('操作成功'); await loadReview();
  };

  /* Jobs */
  const loadJobs = async () => {
    const res = await apiFetch('/admin/jobs?page_size=100'); state.jobs = res.data?.list||[];
    const cs = [...new Set(state.jobs.map(j=>j.country).filter(Boolean))].sort();
    const selC = el('jobFilterCountry'); const vs = selC.value;
    selC.innerHTML = '<option value="">全部地区</option>' + cs.map(c=>`<option value="${c}">${c}</option>`).join(''); selC.value=vs;
    el('jobCountry').innerHTML = cs.length ? cs.map(c=>`<option value="${c}">${c}</option>`).join('') : '<option value="US">US</option>';
    renderJobs();
  };
  const renderJobs = () => {
    const t=el('jobSearch').value.toLowerCase(), c=el('jobFilterCountry').value, s=el('jobFilterStatus').value;
    const l = state.jobs.filter(j => (!c || j.country===c) && (!s || j.status===s) && (!t || j.title.toLowerCase().includes(t) || j.company_name.toLowerCase().includes(t)));
    const tb = el('jobTable'); if(!l.length){tb.innerHTML='';el('jobEmpty').classList.remove('hidden');return;}
    el('jobEmpty').classList.add('hidden');
    const badgeMap = { active:'badge-green', pending:'badge-yellow', banned:'badge-red', rejected:'badge-gray' };
    const statusMap = { active:'已通过', pending:'待审核', banned:'已封禁', rejected:'已拒绝' };
    tb.innerHTML = l.map(j => `
      <tr class="hover:bg-slate-50 transition">
        <td class="px-6 py-4"><p class="font-medium text-slate-800">${escapeHTML(j.title)}</p><p class="text-slate-500 text-xs mt-0.5">${escapeHTML(j.company_name)}</p></td>
        <td class="px-6 py-4 text-slate-600"><span class="font-medium text-slate-700 mr-1">${escapeHTML(j.country)}</span> ${escapeHTML(j.city)}</td>
        <td class="px-6 py-4"><span class="badge ${badgeMap[j.status]||'badge-gray'}">${statusMap[j.status] || j.status}</span></td>
        <td class="px-6 py-4 text-right">
          <button onclick='App.openJobModal(${JSON.stringify(j).replace(/'/g,"&#39;")})' class="btn btn-secondary !px-2 !py-1 text-xs">编辑</button>
          <button onclick="App.deleteJob('${j.id}')" class="btn btn-danger !px-2 !py-1 text-xs bg-transparent border-transparent">删除</button>
        </td>
      </tr>
    `).join('');
  };
  const openJobModal = (j=null) => {
    el('jobModal').classList.add('open'); el('jobForm').reset();
    el('jobModalTitle').textContent = j ? '编辑岗位' : '新增岗位';
    el('jobId').value = j?.id||'';
    ['Title','Company','Country','City','Salary','Type','Platform','Link','Desc','Tags'].forEach(k => el('job'+k).value = j?.[({Title:'title',Company:'company_name',Country:'country',City:'city',Salary:'salary',Type:'job_type',Platform:'contact_platform',Link:'contact_link',Desc:'description',Tags:'tags'})[k]]??(k==='Tags'?[]:(k==='Type'?'Part-time':k==='Platform'?'whatsapp':'')));
    if(j?.tags) el('jobTags').value = j.tags.join(',');
    el('jobReqs').value=(j?.requirements||[]).join('\n'); el('jobResp').value=(j?.responsibilities||[]).join('\n');
  };
  const closeJobModal = () => el('jobModal').classList.remove('open');
  const submitJob = async () => {
    if(!el('jobForm').reportValidity())return;
    const b = { title:el('jobTitle').value, company_name:el('jobCompany').value, country:el('jobCountry').value, city:el('jobCity').value, salary:el('jobSalary').value, job_type:el('jobType').value, contact_platform:el('jobPlatform').value, contact_link:el('jobLink').value, description:el('jobDesc').value, requirements:el('jobReqs').value.split('\n').filter(Boolean), responsibilities:el('jobResp').value.split('\n').filter(Boolean), tags:el('jobTags').value.split(',').map(s=>s.trim()).filter(Boolean)};
    const id = el('jobId').value;
    await apiFetch(id?`/admin/jobs/${id}`:'/admin/jobs', {method:id?'PATCH':'POST',body:JSON.stringify(b)});
    showToast(id?'已更新':'已创建'); closeJobModal(); loadJobs(); loadReview();
  };
  const deleteJob = async (id) => { if(!confirm('确定永久删除该岗位？'))return; await apiFetch(`/admin/jobs/${id}`,{method:'DELETE'}); showToast('已删除'); loadJobs(); loadReview(); };

  /* Reports */
  const loadReports = async () => { const res = await apiFetch('/admin/reports?page_size=100'); state.reports = res.data?.list||[]; updateBadge('badge-reports', state.reports.filter(r=>r.status==='pending').length); renderReports(); };
  const setReportFilter = (f) => {
    state.reportFilter = f;
    document.querySelectorAll('.report-filter-btn').forEach(b => { b.className = b.dataset.filter===f ? 'report-filter-btn px-3 py-1 rounded text-xs font-medium bg-slate-200 text-slate-800' : 'report-filter-btn px-3 py-1 rounded text-xs font-medium text-slate-600 hover:bg-slate-100'; });
    renderReports();
  };
  const renderReports = () => {
    const l = state.reportFilter ? state.reports.filter(r=>r.status===state.reportFilter) : state.reports; const tb = el('reportTable');
    if(!l.length){tb.innerHTML='';el('reportEmpty').classList.remove('hidden');return;} el('reportEmpty').classList.add('hidden');
    const badgeMap = { pending:'badge-yellow', resolved:'badge-green', dismissed:'badge-gray' };
    const statusMap = { pending:'待处理', resolved:'已处理', dismissed:'已忽略' };
    tb.innerHTML = l.map(r => `
      <tr class="hover:bg-slate-50 transition">
        <td class="px-6 py-4 font-medium text-slate-700">${escapeHTML(r.type)}</td>
        <td class="px-6 py-4"><div class="max-w-[200px] truncate text-slate-500" title="${escapeHTML(r.reason)}">${escapeHTML(r.reason||'-')}</div></td>
        <td class="px-6 py-4 text-xs font-mono text-blue-600">${escapeHTML(r.job_id||'-')}</td>
        <td class="px-6 py-4"><span class="badge ${badgeMap[r.status]||'badge-gray'}">${statusMap[r.status] || r.status}</span></td>
        <td class="px-6 py-4 text-right">
          ${r.status==='pending' ? `<button onclick="App.handleReport('${r.id}','resolve',true)" class="btn btn-secondary !px-2 !py-1 text-xs hover:!text-red-600 hover:!border-red-200 mr-1">封禁并处理</button><button onclick="App.handleReport('${r.id}','resolve',false)" class="btn btn-secondary !px-2 !py-1 text-xs hover:!text-green-600 hover:!border-green-200 mr-1">标记已处理</button><button onclick="App.handleReport('${r.id}','dismiss',false)" class="btn btn-secondary border-transparent bg-transparent !px-2 !py-1 text-xs">忽略</button>` : '<span class="text-slate-400 text-xs italic">已处理</span>'}
        </td>
      </tr>
    `).join('');
  };
  const handleReport = async (id, act, ban) => { if(!confirm('确认处理该举报？'))return; await apiFetch(`/admin/reports/${id}/handle`,{method:'POST',body:JSON.stringify({action:act, ban_job:ban})}); showToast('处理成功'); await loadReports(); if(ban){loadReview();loadJobs();} };

  /* Countries */
  const loadCountries = async () => { const res = await apiFetch('/admin/countries'); state.countries = res.data||[]; renderCountries(); };
  const renderCountries = () => {
    el('countryTable').innerHTML = state.countries.map(c => `
      <tr class="hover:bg-slate-50 transition">
        <td class="px-6 py-4 font-semibold text-slate-700 uppercase">${escapeHTML(c.code)}</td>
        <td class="px-6 py-4 text-slate-800">${escapeHTML(c.name)}</td>
        <td class="px-6 py-4 text-slate-600">${escapeHTML(c.currency||'-')}</td>
        <td class="px-6 py-4 text-slate-500 text-xs">${(c.fallback_order||[]).join(', ')||'-'}</td>
        <td class="px-6 py-4 text-right"><button onclick='App.openCountryModal(${JSON.stringify(c).replace(/'/g,"&#39;")})' class="btn btn-secondary !px-2 !py-1 text-xs mr-1">编辑</button><button onclick="App.deleteCountry('${c.code}')" class="btn btn-danger !px-2 !py-1 text-xs bg-transparent border-transparent">删除</button></td>
      </tr>
    `).join('');
  };
  const openCountryModal = (c=null) => { el('countryModal').classList.add('open'); el('countryForm').reset(); el('countryModalTitle').textContent=c?'编辑地区':'添加地区'; el('countryCode').value=c?.code||''; el('countryName').value=c?.name||''; el('countryCurrency').value=c?.currency||''; el('countrySupport').value=c?.support_link||''; el('countryFallback').value=(c?.fallback_order||[]).join(','); };
  const closeCountryModal = () => el('countryModal').classList.remove('open');
  const submitCountry = async () => { if(!el('countryForm').reportValidity())return; const b={name:el('countryName').value, currency:el('countryCurrency').value, support_link:el('countrySupport').value, fallback_order:el('countryFallback').value.split(',').map(s=>s.trim().toUpperCase()).filter(Boolean)}; await apiFetch(`/admin/countries/${el('countryCode').value.toUpperCase()}`,{method:'POST',body:JSON.stringify(b)}); showToast('保存成功'); closeCountryModal(); loadCountries(); };
  const deleteCountry = async (code) => { if(!confirm('确定删除该地区？'))return; await apiFetch(`/admin/countries/${code}`,{method:'DELETE'}); showToast('已删除'); loadCountries(); };

  /* Config */
  const loadConfig = async () => { const res = await apiFetch('/admin/configs'); const cfg = res.data||{}; ['Search','Filter','Contact','Report','Share'].forEach(k => el('cfg'+k).checked = cfg[k.toLowerCase()+'_enabled']!==false && (cfg[k.toLowerCase()+'_enabled']||(k==='Contact'||k==='Report'))); el('cfgVersion').value = cfg.version||'1.0.0'; };
  return { init:()=>{
    switchTab('review');
    bindSidebar();
    el('configForm').addEventListener('submit', async e => { e.preventDefault(); const b={search_enabled:el('cfgSearch').checked, filter_enabled:el('cfgFilter').checked, contact_enabled:el('cfgContact').checked, report_enabled:el('cfgReport').checked, share_enabled:el('cfgShare').checked, version:el('cfgVersion').value}; await apiFetch('/admin/configs',{method:'POST',body:JSON.stringify(b)}); showToast('配置已保存'); });
    el('jobSearch').addEventListener('input', renderJobs); el('jobFilterCountry').addEventListener('change', renderJobs); el('jobFilterStatus').addEventListener('change', renderJobs);
  }, switchTab, setReportFilter, reviewAction, handleReport, openJobModal, closeJobModal, submitJob, deleteJob, openCountryModal, closeCountryModal, submitCountry, deleteCountry };
})();
window.App = App;
function bindSidebar() {
  document.querySelectorAll('.sidebar-link').forEach(el => {
    const tab = el.dataset.tab;
    if(tab) el.addEventListener('click', () => App.switchTab(tab));
  });
}
document.addEventListener('DOMContentLoaded', App.init);
</script>
</body>
</html>
