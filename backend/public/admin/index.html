<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>GPTJobs 管理后台</title>
<script src="./tw-cdn.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
html, body { height: 100%; background-color: #f8fafc; color: #334155; font-family: 'Inter', sans-serif; }
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }
.sidebar-link { display: flex; align-items: center; gap: 0.75rem; padding: 0.5rem 0.75rem; border-radius: 0.375rem; color: #94a3b8; font-size: 0.875rem; font-weight: 500; cursor: pointer; }
.sidebar-link:hover { color: #f8fafc; background: rgba(255,255,255,0.05); }
.sidebar-link.active { color: #fff; background: rgba(255,255,255,0.1); }
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 0.375rem; font-size: 0.875rem; font-weight: 500; padding: 0.5rem 1rem; border-radius: 0.375rem; cursor: pointer; border: none; }
.btn-primary { background: #2563eb; color: #fff; }
.btn-secondary { background: #fff; color: #475569; border: 1px solid #cbd5e1; }
.badge { padding: 0.125rem 0.625rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 500; }
.modal-overlay { position: fixed; inset: 0; background: rgba(15,23,42,0.5); display: none; align-items: center; justify-content: center; z-index: 50; }
.modal-overlay.open { display: flex; }
.toast { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 60; background: #1e293b; color: #fff; padding: 1rem; border-radius: 0.5rem; transform: translateY(150%); transition: transform 0.3s; }
.toast.show { transform: translateY(0); }
input, select { background: #fff; border: 1px solid #cbd5e1; border-radius: 0.5rem; padding: 0.5rem; }
input:focus { border-color: #3b82f6; outline: none; }
.analytics-table th, .analytics-table td { padding: 0.75rem; border-bottom: 1px solid #e2e8f0; }
.analytics-table th { background: #f8fafc; font-weight: 500; text-align: left; }
.analytics-table td { text-align: center; }
.analytics-table td:first-child, .analytics-table th:first-child { text-align: left; }
.country-group { margin-bottom: 1rem; }
.country-group-header { background: #f1f5f9; padding: 0.5rem 0.75rem; font-weight: 600; font-size: 0.875rem; color: #475569; border-radius: 0.375rem; margin-bottom: 0.5rem; }
</style>
</head>
<body class="flex flex-col h-screen overflow-hidden text-sm">

<header class="h-14 bg-slate-900 text-white flex items-center justify-between px-6 border-b border-slate-800">
  <span class="font-semibold text-base">GPTJobs 管理后台</span>
  <div class="flex items-center gap-4 text-slate-300">
    <span class="w-2 h-2 rounded-full bg-green-400"></span>
    <span class="text-xs">系统运行正常</span>
  </div>
</header>

<div class="flex flex-1 overflow-hidden">
  <aside class="w-60 bg-slate-900 border-r border-slate-800 flex flex-col pt-4 pb-4">
    <nav class="flex-1 px-3 space-y-1">
      <div class="sidebar-link active" data-tab="review" onclick="switchTab('review')"><span>审核中心</span></div>
      <div class="sidebar-link" data-tab="jobs" onclick="switchTab('jobs')"><span>岗位管理</span></div>
      <div class="sidebar-link" data-tab="reports" onclick="switchTab('reports')"><span>举报处理</span></div>
      <div class="sidebar-link" data-tab="analytics" onclick="switchTab('analytics')"><span>数据统计</span></div>
      <div class="sidebar-link" data-tab="config" onclick="switchTab('config')"><span>应用配置</span></div>
    </nav>
  </aside>

  <main class="flex-1 bg-slate-50 flex flex-col overflow-hidden">
    <div class="bg-white border-b border-slate-200 px-8 py-5 flex items-center justify-between">
      <div>
        <h1 id="pageTitle" class="text-xl font-semibold text-slate-900">审核中心</h1>
        <p id="pageSubtitle" class="text-sm text-slate-500 mt-1">管理待审核岗位</p>
      </div>
      <div id="headerActions"></div>
    </div>

    <div class="flex-1 overflow-auto p-8">
      <!-- REVIEW PANEL -->
      <div id="panel-review" class="tab-panel active">
        <div class="bg-white border border-slate-200 rounded-lg shadow-sm">
          <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
            <span class="font-medium text-slate-800">待审核列表</span>
            <span id="reviewStat" class="text-xs text-slate-500">0 条</span>
          </div>
          <table class="w-full text-left">
            <thead class="bg-slate-50 text-slate-500 text-xs uppercase border-b border-slate-200">
              <tr><th class="px-6 py-3">岗位 / 公司</th><th class="px-6 py-3">地区</th><th class="px-6 py-3">薪资</th><th class="px-6 py-3">提交时间</th><th class="px-6 py-3 text-right">操作</th></tr>
            </thead>
            <tbody id="reviewTable" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>

      <!-- JOBS PANEL -->
      <div id="panel-jobs" class="tab-panel">
        <div class="bg-white border border-slate-200 rounded-lg shadow-sm p-4 mb-6 flex flex-wrap items-center gap-4">
          <input id="jobSearch" type="text" placeholder="搜索岗位..." class="w-64">
          <select id="jobFilterCountry" class="w-32"><option value="">全部国家</option></select>
          <select id="jobFilterStatus" class="w-32">
            <option value="">全部状态</option>
            <option value="active">已通过</option>
            <option value="pending">待审核</option>
            <option value="banned">已封禁</option>
            <option value="rejected">已拒绝</option>
          </select>
          <div class="flex-1"></div>
          <button onclick="openJobModal()" class="btn btn-primary">+ 新增岗位</button>
        </div>
        <div class="bg-white border border-slate-200 rounded-lg shadow-sm overflow-hidden">
          <table class="w-full text-left">
            <thead class="bg-slate-50 text-slate-500 text-xs uppercase border-b border-slate-200">
              <tr><th class="px-6 py-3">岗位信息</th><th class="px-6 py-3">地点</th><th class="px-6 py-3">状态</th><th class="px-6 py-3 text-right">操作</th></tr>
            </thead>
            <tbody id="jobTable" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>

      <!-- REPORTS PANEL -->
      <div id="panel-reports" class="tab-panel">
        <div class="bg-white border border-slate-200 rounded-lg shadow-sm">
          <div class="px-6 py-4 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
            <span class="font-medium text-slate-800">举报队列</span>
            <div class="flex gap-2">
              <button onclick="setReportFilter('')" class="px-3 py-1 rounded text-xs bg-slate-200">全部</button>
              <button onclick="setReportFilter('pending')" class="px-3 py-1 rounded text-xs">待处理</button>
            </div>
          </div>
          <table class="w-full text-left">
            <thead class="bg-slate-50 text-slate-500 text-xs uppercase border-b border-slate-200">
              <tr><th class="px-6 py-3">类型</th><th class="px-6 py-3">详情</th><th class="px-6 py-3">岗位ID</th><th class="px-6 py-3">状态</th><th class="px-6 py-3 text-right">操作</th></tr>
            </thead>
            <tbody id="reportTable" class="divide-y divide-slate-100"></tbody>
          </table>
        </div>
      </div>

      <!-- ANALYTICS PANEL - Enhanced with per-country per-job stats -->
      <div id="panel-analytics" class="tab-panel">
        <div class="flex flex-col gap-4">
          <!-- Date Filter -->
          <div class="flex flex-wrap items-center gap-3 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
            <label class="text-sm text-slate-500">开始日期</label>
            <input id="analyticsStartDate" type="date">
            <label class="text-sm text-slate-500">结束日期</label>
            <input id="analyticsEndDate" type="date">
            <select id="analyticsCountryFilter" class="w-40">
              <option value="">所有国家</option>
            </select>
            <button onclick="loadAnalytics()" class="btn btn-primary">查询</button>
          </div>
          
          <!-- Per-Country Job Stats Table -->
          <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
            <div class="px-5 py-4 border-b border-slate-100 flex justify-between items-center">
              <div class="text-sm font-medium text-slate-700">各国家岗位数据统计</div>
              <div class="text-xs text-slate-400">浏览 / 详情 / 联系</div>
            </div>
            <div id="analyticsContent" class="p-4">
              <div class="text-center py-8 text-slate-400">请选择日期范围查询</div>
            </div>
          </div>
        </div>
      </div>

      <!-- CONFIG PANEL -->
      <div id="panel-config" class="tab-panel">
        <div class="max-w-2xl">
          <form id="configForm" class="bg-white rounded-xl border border-slate-200 shadow-sm p-6 space-y-6">
            <div>
              <h3 class="text-sm font-semibold text-slate-900 mb-4">功能开关</h3>
              <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                <label class="flex items-center justify-between border border-slate-200 rounded-lg px-4 py-3">
                  <span class="text-sm text-slate-700">搜索</span>
                  <input type="checkbox" id="cfgSearch" class="w-5 h-5">
                </label>
                <label class="flex items-center justify-between border border-slate-200 rounded-lg px-4 py-3">
                  <span class="text-sm text-slate-700">筛选</span>
                  <input type="checkbox" id="cfgFilter" class="w-5 h-5">
                </label>
                <label class="flex items-center justify-between border border-slate-200 rounded-lg px-4 py-3">
                  <span class="text-sm text-slate-700">联系入口</span>
                  <input type="checkbox" id="cfgContact" class="w-5 h-5">
                </label>
                <label class="flex items-center justify-between border border-slate-200 rounded-lg px-4 py-3">
                  <span class="text-sm text-slate-700">举报</span>
                  <input type="checkbox" id="cfgReport" class="w-5 h-5">
                </label>
                <label class="flex items-center justify-between border border-slate-200 rounded-lg px-4 py-3">
                  <span class="text-sm text-slate-700">分享</span>
                  <input type="checkbox" id="cfgShare" class="w-5 h-5">
                </label>
              </div>
            </div>
            <button type="submit" class="btn btn-primary">保存配置</button>
          </form>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Job Modal -->
<div id="jobModal" class="modal-overlay">
  <div class="bg-white rounded-xl w-full max-w-2xl max-h-[92vh] overflow-y-auto shadow-2xl m-4">
    <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
      <h3 id="jobModalTitle" class="text-lg font-semibold text-slate-900">新增岗位</h3>
      <button onclick="closeJobModal()" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
    </div>
    <form id="jobForm" class="px-6 py-5 space-y-5">
      <input type="hidden" id="jobId">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">岗位名称 *</label>
          <input id="jobTitle" type="text" required class="w-full">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">公司名称 *</label>
          <input id="jobCompany" type="text" required class="w-full">
        </div>
        <div class="relative md:col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1">国家 *</label>
          <input id="jobCountrySearch" type="text" required class="w-full" placeholder="点击选择或输入搜索国家代码/中文..." autocomplete="off" oninput="filterCountries(this.value)" onclick="showAllCountries()">
          <input type="hidden" id="jobCountryCode">
          <div id="countryDropdown" class="hidden absolute z-50 bg-white border border-slate-200 rounded-lg shadow-lg max-h-80 overflow-y-auto w-full mt-1"></div>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">城市</label>
          <input id="jobCity" type="text" class="w-full">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">薪资 *</label>
          <input id="jobSalary" type="text" required class="w-full" placeholder="如：35k-50k 或 $5000/month">
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">工作类型</label>
          <select id="jobType" class="w-full">
            <option value="full_time">全职</option>
            <option value="part_time">兼职</option>
            <option value="contract">合同</option>
          </select>
        </div>
        <div>
          <label class="block text-sm font-medium text-slate-700 mb-1">联系平台</label>
          <select id="jobContactType" class="w-full">
            <option value="whatsapp">WhatsApp</option>
            <option value="telegram">Telegram</option>
            <option value="email">Email</option>
            <option value="link">链接</option>
          </select>
        </div>
        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-slate-700 mb-1">联系链接 *</label>
          <input id="jobContactLink" type="text" required class="w-full">
        </div>
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-700 mb-1">岗位描述</label>
        <textarea id="jobDescription" rows="4" class="w-full"></textarea>
      </div>
      <div class="flex justify-end gap-3 pt-2">
        <button type="button" onclick="closeJobModal()" class="btn btn-secondary">取消</button>
        <button type="submit" class="btn btn-primary">保存</button>
      </div>
    </form>
  </div>
</div>

<div id="toast" class="toast"></div>

async function api(url, opts = {}) {
  const res = await fetch(API_BASE + url, { headers: { 'Content-Type': 'application/json' }, ...opts });
  const data = await res.json();
  if (data.code !== 200 && data.code !== 0) throw new Error(data.message);
  return data;
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

function switchTab(name) {
  document.querySelectorAll('.tab-panel').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  document.querySelectorAll('.sidebar-link').forEach(n => n.classList.remove('active'));
  document.querySelector('.sidebar-link[data-tab="' + name + '"]').classList.add('active');
  const titles = { review: '审核中心', jobs: '岗位管理', reports: '举报处理', analytics: '数据统计', config: '应用配置' };
  document.getElementById('pageTitle').textContent = titles[name];
  if (name === 'review') loadReviews();
  if (name === 'jobs') loadJobs();
  if (name === 'reports') loadReports();
  if (name === 'analytics') initAnalytics();
  if (name === 'config') loadConfig();
}

// Reviews
async function loadReviews() {
  const data = await api('/admin/jobs?status=pending');
  const list = data.data?.list || [];
  document.getElementById('reviewTable').innerHTML = list.map(j => `
    <tr class="hover:bg-slate-50">
      <td class="px-6 py-4"><div class="font-medium text-slate-900">${j.title}</div><div class="text-sm text-slate-500">${j.company}</div></td>
      <td class="px-6 py-4 text-sm text-slate-600">${j.country} ${j.city || ''}</td>
      <td class="px-6 py-4 text-sm text-slate-600">${j.salary}</td>
      <td class="px-6 py-4 text-sm text-slate-500">${new Date(j.created_at).toLocaleDateString()}</td>
      <td class="px-6 py-4 text-right">
        <button onclick="reviewJob('${j.id}', 'approve')" class="text-green-600 mr-2">通过</button>
        <button onclick="reviewJob('${j.id}', 'reject')" class="text-red-600">拒绝</button>
      </td>
    </tr>
  `).join('');
  document.getElementById('reviewStat').textContent = list.length + ' 条';
}

async function reviewJob(id, action) {
  await api('/admin/jobs/' + id + '/review', { method: 'POST', body: JSON.stringify({ action }) });
  showToast(action === 'approve' ? '已通过' : '已拒绝');
  loadReviews();
  loadJobs();
}

// Jobs
let allJobs = [];
async function loadJobs() {
  const data = await api('/admin/jobs?page_size=100');
  allJobs = data.data?.list || [];
  renderJobs();
  populateCountryFilter();
}

function populateCountryFilter() {
  const sel = document.getElementById('jobFilterCountry');
  const codes = [...new Set(allJobs.map(j => j.country).filter(Boolean))].sort();
  sel.innerHTML = '<option value="">全部国家</option>' + codes.map(c => `<option value="${c}">${c}</option>`).join('');
}

function renderJobs() {
  const term = document.getElementById('jobSearch').value.toLowerCase();
  const c = document.getElementById('jobFilterCountry').value;
  const s = document.getElementById('jobFilterStatus').value;
  const filtered = allJobs.filter(j => {
    if (c && j.country !== c) return false;
    if (s && j.status !== s) return false;
    if (term && !j.title.toLowerCase().includes(term)) return false;
    return true;
  });
  const stMap = { active: { cls: 'bg-emerald-50 text-emerald-700', txt: '上架' }, pending: { cls: 'bg-amber-50 text-amber-700', txt: '待审核' }, banned: { cls: 'bg-rose-50 text-rose-700', txt: '下架' }, rejected: { cls: 'bg-slate-50 text-slate-600', txt: '已拒绝' } };
  document.getElementById('jobTable').innerHTML = filtered.map(j => {
    const st = stMap[j.status] || { cls: 'bg-slate-50', txt: j.status };
    return `
    <tr class="hover:bg-slate-50">
      <td class="px-6 py-4"><div class="font-medium text-slate-900">${j.title}</div><div class="text-sm text-slate-500">${j.company}</div></td>
      <td class="px-6 py-4 text-sm text-slate-600">${j.country} ${j.city || ''}</td>
      <td class="px-6 py-4"><span class="badge ${st.cls}">${st.txt}</span></td>
      <td class="px-6 py-4 text-right">
        <button onclick="editJob('${j.id}')" class="text-blue-600 mr-2">编辑</button>
        <button onclick="deleteJob('${j.id}')" class="text-red-600">删除</button>
      </td>
    </tr>`;
  }).join('');
}

// Country Dropdown - Show all countries by default with region grouping
function showAllCountries() {
  const dropdown = document.getElementById('countryDropdown');
  const regions = [...new Set(COUNTRIES.map(c => c.region))];
  
  let html = '';
  regions.forEach(region => {
    const regionCountries = COUNTRIES.filter(c => c.region === region);
    html += `<div class="country-group">
      <div class="country-group-header">${region}</div>
      ${regionCountries.map(c => `
        <div onclick="selectCountry('${c.code}', '${c.name}')" class="px-4 py-2 hover:bg-slate-100 cursor-pointer flex justify-between items-center">
          <span class="font-medium">${c.name}</span>
          <span class="text-slate-400 text-sm">${c.code}</span>
        </div>
      `).join('')}
    </div>`;
  });
  
  dropdown.innerHTML = html;
  dropdown.classList.remove('hidden');
}

// Filter countries by query (name, pinyin, or code)
function filterCountries(query) {
  const dropdown = document.getElementById('countryDropdown');
  const q = query.toLowerCase().trim();
  
  // If empty, show all
  if (!q) {
    showAllCountries();
    return;
  }
  
  const matches = COUNTRIES.filter(c => 
    c.name.toLowerCase().includes(q) || 
    c.pinyin.includes(q) || 
    c.code.toLowerCase().includes(q) ||
    c.en.toLowerCase().includes(q)
  );
  
  if (matches.length === 0) {
    dropdown.innerHTML = `<div class="px-4 py-3 text-slate-400 text-sm">未找到匹配的国家</div>`;
    dropdown.classList.remove('hidden');
    return;
  }
  
  // Group matches by region
  const regions = [...new Set(matches.map(c => c.region))];
  let html = '';
  regions.forEach(region => {
    const regionCountries = matches.filter(c => c.region === region);
    html += `<div class="country-group">
      <div class="country-group-header">${region}</div>
      ${regionCountries.map(c => `
        <div onclick="selectCountry('${c.code}', '${c.name}')" class="px-4 py-2 hover:bg-slate-100 cursor-pointer flex justify-between items-center">
          <span class="font-medium">${c.name}</span>
          <span class="text-slate-400 text-sm">${c.code}</span>
        </div>
      `).join('')}
    </div>`;
  });
  
  dropdown.innerHTML = html;
  dropdown.classList.remove('hidden');
}

function selectCountry(code, name) {
  document.getElementById('jobCountrySearch').value = name;
  document.getElementById('jobCountryCode').value = code;
  document.getElementById('countryDropdown').classList.add('hidden');
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  const container = document.querySelector('#jobForm .relative');
  if (container && !container.contains(e.target)) {
    document.getElementById('countryDropdown').classList.add('hidden');
  }
});

function openJobModal() {
  document.getElementById('jobModal').classList.add('open');
  document.getElementById('jobForm').reset();
  document.getElementById('jobId').value = '';
  document.getElementById('jobModalTitle').textContent = '新增岗位';
  document.getElementById('jobCountryCode').value = '';
  document.getElementById('countryDropdown').classList.add('hidden');
}

function closeJobModal() {
  document.getElementById('jobModal').classList.remove('open');
  document.getElementById('countryDropdown').classList.add('hidden');
}

function editJob(id) {
  const j = allJobs.find(x => x.id === id);
  if (!j) return;
  openJobModal();
  document.getElementById('jobId').value = j.id;
  document.getElementById('jobTitle').value = j.title;
  document.getElementById('jobCompany').value = j.company;
  document.getElementById('jobCountrySearch').value = j.country;
  document.getElementById('jobCountryCode').value = j.country;
  document.getElementById('jobCity').value = j.city || '';
  document.getElementById('jobSalary').value = j.salary;
  document.getElementById('jobType').value = j.job_type || 'full_time';
  document.getElementById('jobContactType').value = j.contact_platform || 'whatsapp';
  document.getElementById('jobContactLink').value = j.contact_link;
  document.getElementById('jobDescription').value = j.description || '';
  document.getElementById('jobModalTitle').textContent = '编辑岗位';
}

async function deleteJob(id) {
  if (!confirm('确定删除该岗位？')) return;
  await api('/admin/jobs/' + id, { method: 'DELETE' });
  showToast('已删除');
  loadJobs();
}

document.getElementById('jobForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const id = document.getElementById('jobId').value;
  const body = {
    title: document.getElementById('jobTitle').value,
    company: document.getElementById('jobCompany').value,
    country: document.getElementById('jobCountryCode').value || document.getElementById('jobCountrySearch').value,
    city: document.getElementById('jobCity').value,
    salary: document.getElementById('jobSalary').value,
    job_type: document.getElementById('jobType').value,
    contact_platform: document.getElementById('jobContactType').value,
    contact_link: document.getElementById('jobContactLink').value,
    description: document.getElementById('jobDescription').value,
    status: 'active'
  };
  if (id) {
    await api('/admin/jobs/' + id, { method: 'PATCH', body: JSON.stringify(body) });
  } else {
    await api('/admin/jobs', { method: 'POST', body: JSON.stringify(body) });
  }
  showToast(id ? '已更新' : '已创建');
  closeJobModal();
  loadJobs();
});

// Reports
let reportFilter = '';
async function loadReports() {
  const data = await api('/admin/reports');
  let list = data.data || [];
  if (reportFilter) list = list.filter(r => r.status === reportFilter);
  document.getElementById('reportTable').innerHTML = list.map(r => `
    <tr class="hover:bg-slate-50">
      <td class="px-6 py-4 text-sm">${r.type}</td>
      <td class="px-6 py-4 text-sm text-slate-600 max-w-xs truncate" title="${r.reason}">${r.reason || '-'}</td>
      <td class="px-6 py-4 text-xs text-blue-600">${r.job_id || '-'}</td>
      <td class="px-6 py-4"><span class="badge ${r.status === 'pending' ? 'bg-amber-50 text-amber-700' : 'bg-slate-50 text-slate-600'}">${r.status}</span></td>
      <td class="px-6 py-4 text-right">
        ${r.status === 'pending' ? `<button onclick="handleReport('${r.id}', 'resolve')" class="text-green-600 mr-2">处理</button><button onclick="handleReport('${r.id}', 'dismiss')" class="text-slate-400">忽略</button>` : '<span class="text-slate-400 text-xs">已处理</span>'}
      </td>
    </tr>
  `).join('');
}

function setReportFilter(f) {
  reportFilter = f;
  loadReports();
}

async function handleReport(id, action) {
  if (!confirm('确定' + (action === 'resolve' ? '处理' : '忽略') + '该举报？')) return;
  await api('/admin/reports/' + id + '/handle', { method: 'POST', body: JSON.stringify({ action }) });
  showToast('举报已' + (action === 'resolve' ? '处理' : '忽略'));
  loadReports();
}

// Analytics - Enhanced with per-country per-job stats
function initAnalytics() {
  const today = new Date().toISOString().split('T')[0];
  document.getElementById('analyticsStartDate').value = today;
  document.getElementById('analyticsEndDate').value = today;
  populateAnalyticsCountryFilter();
  loadAnalytics();
}

function populateAnalyticsCountryFilter() {
  const sel = document.getElementById('analyticsCountryFilter');
  sel.innerHTML = '<option value="">所有国家</option>' + 
    COUNTRIES.map(c => `<option value="${c.code}">${c.name}</option>`).join('');
}

async function loadAnalytics() {
  const start = document.getElementById('analyticsStartDate').value;
  const end = document.getElementById('analyticsEndDate').value;
  const countryFilter = document.getElementById('analyticsCountryFilter').value;
  
  if (!start || !end) return;
  
  try {
    // Load per-country per-job stats
    const jobStatsUrl = '/admin/events/job-stats?start_date=' + start + '&end_date=' + end + 
                       (countryFilter ? '&country=' + countryFilter : '');
    const jobStatsData = await api(jobStatsUrl);
    const jobStats = jobStatsData.data || [];
    
    renderJobStatsTable(jobStats);
  } catch (e) {
    console.error(e);
    document.getElementById('analyticsContent').innerHTML = '<div class="text-center py-8 text-slate-400">加载数据失败</div>';
  }
}

function renderJobStatsTable(jobStats) {
  const container = document.getElementById('analyticsContent');
  
  if (!jobStats || !jobStats.jobs || jobStats.jobs.length === 0) {
    container.innerHTML = '<div class="text-center py-8 text-slate-400">暂无数据</div>';
    return;
  }
  
  const jobs = jobStats.jobs;
  
  // Group by country
  const byCountry = {};
  jobs.forEach(stat => {
    const countryCode = stat.country || '未知';
    if (!byCountry[countryCode]) byCountry[countryCode] = [];
    byCountry[countryCode].push(stat);
  });
  
  let html = '<table class="analytics-table w-full text-sm">';
  html += '<thead><tr><th style="width:15%">国家</th><th style="width:35%">岗位</th><th style="width:15%">浏览</th><th style="width:15%">详情</th><th style="width:15%">联系</th></tr></thead>';
  html += '<tbody>';
  
  Object.keys(byCountry).sort().forEach(country => {
    const countryStats = byCountry[country];
    const countryName = COUNTRIES.find(c => c.code === country)?.name || country;
    const rowCount = countryStats.length;
    
    countryStats.forEach((stat, index) => {
      html += `<tr class="hover:bg-slate-50">`;
      if (index === 0) {
        html += `<td rowspan="${rowCount}" class="font-medium bg-slate-50 align-middle" style="border-bottom:1px solid #e2e8f0">${countryName}<br><span class="text-xs text-slate-400">${country}</span></td>`;
      }
      html += `
        <td class="text-left py-3">${stat.job_title || '未知岗位'}<br><span class="text-xs text-slate-400">${stat.job_id}</span></td>
        <td class="font-medium text-blue-600">${stat.job_list_view || 0}</td>
        <td class="font-medium text-green-600">${stat.job_detail_open || 0}</td>
        <td class="font-medium text-purple-600">${stat.job_contact_click || 0}</td>
      </tr>`;
    });
  });
  
  html += '</tbody></table>';
  html += `<div class="mt-4 text-xs text-slate-400">共 ${jobs.length} 个岗位数据</div>`;
  container.innerHTML = html;
}

// Config
async function loadConfig() {
  try {
    const data = await api('/app/config');
    const cfg = data.data || {};
    document.getElementById('cfgSearch').checked = cfg.search_enabled !== false;
    document.getElementById('cfgFilter').checked = cfg.filter_enabled !== false;
    document.getElementById('cfgContact').checked = cfg.contact_enabled !== false;
    document.getElementById('cfgReport').checked = cfg.report_enabled !== false;
    document.getElementById('cfgShare').checked = cfg.share_enabled !== false;
  } catch (e) {}
}

document.getElementById('configForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const body = {
    search_enabled: document.getElementById('cfgSearch').checked,
    filter_enabled: document.getElementById('cfgFilter').checked,
    contact_enabled: document.getElementById('cfgContact').checked,
    report_enabled: document.getElementById('cfgReport').checked,
    share_enabled: document.getElementById('cfgShare').checked
  };
  await api('/admin/configs', { method: 'POST', body: JSON.stringify(body) });
  showToast('配置已保存');
});
