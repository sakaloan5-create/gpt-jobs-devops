<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>发布岗位 - GPTJobs</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  padding: 40px 20px;
}

.container {
  max-width: 680px;
  margin: 0 auto;
}

.header {
  text-align: center;
  margin-bottom: 32px;
  color: white;
}

.header h1 {
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 8px;
}

.header p {
  font-size: 14px;
  opacity: 0.9;
}

.progress-bar {
  display: flex;
  justify-content: center;
  gap: 8px;
  margin-bottom: 24px;
}

.progress-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: rgba(255,255,255,0.3);
  transition: all 0.3s;
}

.progress-dot.active {
  background: white;
  width: 24px;
  border-radius: 4px;
}

.card {
  background: white;
  border-radius: 16px;
  padding: 32px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
}

.section-title {
  font-size: 18px;
  font-weight: 600;
  color: #1a202c;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.section-title::before {
  content: '';
  width: 4px;
  height: 20px;
  background: linear-gradient(180deg, #667eea 0%, #764ba2 100%);
  border-radius: 2px;
}

.form-group {
  margin-bottom: 20px;
}

.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}

@media (max-width: 600px) {
  .form-row {
    grid-template-columns: 1fr;
  }
}

label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: #4a5568;
  margin-bottom: 6px;
}

.required::after {
  content: ' *';
  color: #e53e3e;
}

input[type="text"],
input[type="url"],
select,
textarea {
  width: 100%;
  padding: 12px 14px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  font-size: 14px;
  font-family: inherit;
  transition: all 0.2s;
  background: #fff;
}

input:focus,
select:focus,
textarea:focus {
  outline: none;
  border-color: #667eea;
  box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
}

textarea {
  resize: vertical;
  min-height: 100px;
}

.country-select-wrapper {
  position: relative;
}

.country-dropdown {
  position: absolute;
  top: 100%;
  left: 0;
  right: 0;
  margin-top: 4px;
  background: white;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  max-height: 280px;
  overflow-y: auto;
  z-index: 100;
  box-shadow: 0 10px 40px rgba(0,0,0,0.15);
  display: none;
}

.country-dropdown.show {
  display: block;
}

.country-group-header {
  padding: 8px 12px;
  background: #f7fafc;
  font-size: 11px;
  font-weight: 600;
  color: #718096;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.country-option {
  padding: 10px 12px;
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 14px;
}

.country-option:hover {
  background: #f7fafc;
}

.country-option .code {
  font-size: 12px;
  color: #a0aec0;
  font-weight: 500;
}

.divider {
  height: 1px;
  background: #e2e8f0;
  margin: 28px 0;
}

.contact-options {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
  margin-bottom: 16px;
}

@media (max-width: 600px) {
  .contact-options {
    grid-template-columns: repeat(2, 1fr);
  }
}

.contact-option {
  padding: 12px;
  border: 2px solid #e2e8f0;
  border-radius: 10px;
  text-align: center;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 13px;
  font-weight: 500;
  color: #4a5568;
}

.contact-option:hover {
  border-color: #cbd5e0;
}

.contact-option.selected {
  border-color: #667eea;
  background: linear-gradient(135deg, #667eea15 0%, #764ba215 100%);
  color: #667eea;
}

.btn-submit {
  width: 100%;
  padding: 14px;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  color: white;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.3s;
  margin-top: 8px;
}

.btn-submit:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
}

.btn-submit:active {
  transform: translateY(0);
}

.btn-submit:disabled {
  opacity: 0.7;
  cursor: not-allowed;
  transform: none;
}

.success-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 1000;
  backdrop-filter: blur(4px);
}

.success-modal.show {
  display: flex;
}

.success-card {
  background: white;
  padding: 40px;
  border-radius: 20px;
  text-align: center;
  max-width: 360px;
  width: 90%;
  animation: slideUp 0.4s ease;
}

@keyframes slideUp {
  from {
    opacity: 0;
    transform: translateY(30px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

.success-icon {
  width: 72px;
  height: 72px;
  background: linear-gradient(135deg, #48bb78 0%, #38a169 100%);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 0 auto 20px;
  color: white;
  font-size: 32px;
}

.success-title {
  font-size: 22px;
  font-weight: 700;
  color: #1a202c;
  margin-bottom: 8px;
}

.success-text {
  font-size: 14px;
  color: #718096;
  margin-bottom: 24px;
}

.btn-secondary {
  padding: 12px 24px;
  background: #edf2f7;
  color: #4a5568;
  border: none;
  border-radius: 8px;
  font-size: 14px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.btn-secondary:hover {
  background: #e2e8f0;
}

.hidden { display: none !important; }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <h1>🚀 发布新岗位</h1>
    <p>填写信息，让全球人才看到您的招聘需求</p>
  </div>

  <div class="progress-bar">
    <div class="progress-dot active"></div>
    <div class="progress-dot"></div>
    <div class="progress-dot"></div>
  </div>

  <div class="card">
    <form id="jobForm">
      <!-- 基本信息 -->
      <div class="section-title">基本信息</div>
      
      <div class="form-row">
        <div class="form-group">
          <label class="required">岗位名称</label>
          <input type="text" id="title" placeholder="例如：高级前端工程师" required>
        </div>
        <div class="form-group">
          <label class="required">公司名称</label>
          <input type="text" id="company" placeholder="例如：字节跳动" required>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="required">工作地点 - 国家</label>
          <div class="country-select-wrapper">
            <input type="text" id="countryInput" placeholder="点击选择国家..." readonly onclick="toggleCountryDropdown()">
            <input type="hidden" id="countryCode">
            <div class="country-dropdown" id="countryDropdown"></div>
          </div>
        </div>
        <div class="form-group">
          <label>城市（可选）</label>
          <input type="text" id="city" placeholder="例如：北京">
        </div>
      </div>

      <div class="form-group">
        <label class="required">薪资范围</label>
        <input type="text" id="salary" placeholder="例如：35k-50k 或 $5000/month" required>
      </div>

      <div class="divider"></div>

      <!-- 岗位详情 -->
      <div class="section-title">岗位详情</div>

      <div class="form-row">
        <div class="form-group">
          <label>工作类型</label>
          <select id="jobType">
            <option value="full_time">全职</option>
            <option value="part_time">兼职</option>
            <option value="contract">合同</option>
            <option value="intern">实习</option>
          </select>
        </div>
        <div class="form-group">
          <label>经验要求</label>
          <select id="experience">
            <option value="any">不限</option>
            <option value="entry">应届生</option>
            <option value="1-3">1-3年</option>
            <option value="3-5">3-5年</option>
            <option value="5-10">5-10年</option>
            <option value="10+">10年以上</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label class="required">岗位描述</label>
        <textarea id="description" placeholder="请详细描述岗位职责、任职要求、公司介绍等信息..." required></textarea>
      </div>

      <div class="divider"></div>

      <!-- 联系方式 -->
      <div class="section-title">联系方式</div>

      <div class="contact-options">
        <div class="contact-option selected" data-value="whatsapp" onclick="selectContact(this)">
          📱 WhatsApp
        </div>
        <div class="contact-option" data-value="telegram" onclick="selectContact(this)">
          ✈️ Telegram
        </div>
        <div class="contact-option" data-value="email" onclick="selectContact(this)">
          📧 Email
        </div>
        <div class="contact-option" data-value="link" onclick="selectContact(this)">
          🔗 链接
        </div>
      </div>

      <div class="form-group">
        <label class="required">联系链接 / 地址</label>
        <input type="url" id="contactLink" placeholder="例如：https://wa.me/86138xxxxxxxx" required>
      </div>

      <!-- 带追踪的联系按钮 -->
      <div class="form-group">
        <label>测试联系按钮（带追踪）</label>
        <a href="#" 
           id="contactBtn"
           data-contact-link="" 
           data-contact-type="whatsapp"
           class="btn-submit"
           style="display: inline-block; text-decoration: none; text-align: center;"
           onclick="return handleContactClick(this);">
          👆 点击联系（测试追踪）
        </a>
        <p style="font-size: 12px; color: #718096; margin-top: 8px;">
          点击后会触发 Adjust + FB + TikTok + Firebase 事件
        </p>
      </div>

      <div class="form-group">
        <label>标签（用逗号分隔）</label>
        <input type="text" id="tags" placeholder="例如：远程, 区块链, 英语流利">
      </div>

      <button type="submit" class="btn-submit" id="submitBtn">
        发布岗位
      </button>
    </form>
  </div>
</div>

<!-- 成功弹窗 -->
<div class="success-modal" id="successModal">
  <div class="success-card">
    <div class="success-icon">✓</div>
    <div class="success-title">发布成功！</div>
    <div class="success-text">您的岗位已提交审核，通过后将立即上线展示</div>
    <button class="btn-secondary" onclick="resetForm()">再发布一个</button>
  </div>
</div>

<script>
// 国家数据
const COUNTRIES = [
  { code: "CN", name: "中国", region: "亚洲" },
  { code: "US", name: "美国", region: "北美洲" },
  { code: "GB", name: "英国", region: "欧洲" },
  { code: "JP", name: "日本", region: "亚洲" },
  { code: "KR", name: "韩国", region: "亚洲" },
  { code: "SG", name: "新加坡", region: "亚洲" },
  { code: "DE", name: "德国", region: "欧洲" },
  { code: "FR", name: "法国", region: "欧洲" },
  { code: "AU", name: "澳大利亚", region: "大洋洲" },
  { code: "CA", name: "加拿大", region: "北美洲" },
  { code: "PH", name: "菲律宾", region: "亚洲" },
  { code: "ID", name: "印尼", region: "亚洲" },
  { code: "TH", name: "泰国", region: "亚洲" },
  { code: "VN", name: "越南", region: "亚洲" },
  { code: "MY", name: "马来西亚", region: "亚洲" },
  { code: "IN", name: "印度", region: "亚洲" },
  { code: "AE", name: "阿联酋", region: "亚洲" },
  { code: "SA", name: "沙特", region: "亚洲" },
  { code: "BR", name: "巴西", region: "南美洲" },
  { code: "MX", name: "墨西哥", region: "北美洲" },
  { code: "RU", name: "俄罗斯", region: "欧洲" },
  { code: "IT", name: "意大利", region: "欧洲" },
  { code: "ES", name: "西班牙", region: "欧洲" },
  { code: "NL", name: "荷兰", region: "欧洲" },
  { code: "CH", name: "瑞士", region: "欧洲" },
  { code: "SE", name: "瑞典", region: "欧洲" },
  { code: "NZ", name: "新西兰", region: "大洋洲" },
  { code: "ZA", name: "南非", region: "非洲" },
  { code: "EG", name: "埃及", region: "非洲" },
  { code: "NG", name: "尼日利亚", region: "非洲" },
];

// 初始化国家下拉
function initCountryDropdown() {
  const dropdown = document.getElementById('countryDropdown');
  const regions = [...new Set(COUNTRIES.map(c => c.region))];
  
  let html = '';
  regions.forEach(region => {
    const countries = COUNTRIES.filter(c => c.region === region);
    html += `<div class="country-group-header">${region}</div>`;
    countries.forEach(c => {
      html += `
        <div class="country-option" onclick="selectCountry('${c.code}', '${c.name}')">
          <span>${c.name}</span>
          <span class="code">${c.code}</span>
        </div>
      `;
    });
  });
  
  dropdown.innerHTML = html;
}

function toggleCountryDropdown() {
  document.getElementById('countryDropdown').classList.toggle('show');
}

function selectCountry(code, name) {
  document.getElementById('countryInput').value = name;
  document.getElementById('countryCode').value = code;
  document.getElementById('countryDropdown').classList.remove('show');
}

// 点击外部关闭下拉
document.addEventListener('click', (e) => {
  if (!e.target.closest('.country-select-wrapper')) {
    document.getElementById('countryDropdown').classList.remove('show');
  }
});

// 选择联系方式
function selectContact(el) {
  document.querySelectorAll('.contact-option').forEach(opt => opt.classList.remove('selected'));
  el.classList.add('selected');
  updateContactBtn();
}

// 表单提交
document.getElementById('jobForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  
  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.textContent = '发布中...';
  
  const contactPlatform = document.querySelector('.contact-option.selected').dataset.value;
  
  const body = {
    title: document.getElementById('title').value,
    company: document.getElementById('company').value,
    country: document.getElementById('countryCode').value,
    city: document.getElementById('city').value,
    salary: document.getElementById('salary').value,
    job_type: document.getElementById('jobType').value,
    experience: document.getElementById('experience').value,
    description: document.getElementById('description').value,
    contact_platform: contactPlatform,
    contact_link: document.getElementById('contactLink').value,
    tags: document.getElementById('tags').value.split(',').map(t => t.trim()).filter(Boolean),
    status: 'pending'
  };
  
  try {
    const res = await fetch('/api/admin/jobs', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    
    if (res.ok) {
      document.getElementById('successModal').classList.add('show');
    } else {
      alert('发布失败，请重试');
      btn.disabled = false;
      btn.textContent = '发布岗位';
    }
  } catch (err) {
    alert('网络错误，请重试');
    btn.disabled = false;
    btn.textContent = '发布岗位';
  }
});

function resetForm() {
  document.getElementById('jobForm').reset();
  document.getElementById('successModal').classList.remove('show');
  document.getElementById('submitBtn').disabled = false;
  document.getElementById('submitBtn').textContent = '发布岗位';
}

// 更新联系按钮链接
function updateContactBtn() {
  const btn = document.getElementById('contactBtn');
  const link = document.getElementById('contactLink').value;
  const type = document.querySelector('.contact-option.selected').dataset.value;
  
  btn.href = link || '#';
  btn.dataset.contactLink = link;
  btn.dataset.contactType = type;
}

// 处理联系按钮点击
function handleContactClick(btn) {
  const link = btn.dataset.contactLink;
  const type = btn.dataset.contactType;
  
  if (!link || link === '#') {
    alert('请先填写联系链接');
    return false;
  }
  
  // 调用追踪函数（如果已加载）
  if (window.trackContact) {
    window.trackContact(type, link);
    
    // 延迟跳转，确保事件发送完成
    setTimeout(() => {
      window.open(link, '_blank');
    }, 300);
    
    return false;
  }
  
  return true;
}

// 监听输入变化，更新按钮
document.getElementById('contactLink').addEventListener('input', updateContactBtn);

// 初始化按钮
updateContactBtn();

// 初始化
initCountryDropdown();
</script>

<script src="./js/tracking.js"></script>

</body>
</html>
