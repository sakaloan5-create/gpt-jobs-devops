<style>

  .form-input {

    transition: all 0.15s ease; outline: none; appearance: none;
  }
  .form-input:focus {
    border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15) !important;
  }
  .form-select-caret {
    position: absolute; right: 0.875rem; top: 50%; transform: translateY(-50%);
    pointer-events: none; color: #94a3b8;
  }
  .form-label {
    display: block; font-size: 0.8125rem; font-weight: 600; color: #475569;
    margin-bottom: 0.375rem;
  }
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 0.5rem;
    font-size: 0.875rem; font-weight: 500; padding: 0.75rem 1.5rem; border-radius: 0.5rem;
    transition: all 0.15s ease; cursor: pointer;
  }
  .btn-primary { background-color: #2563eb; color: #ffffff; border: 1px solid #2563eb; }
  .btn-primary:active { transform: scale(0.98); }
  .btn-primary:hover { background-color: #1d4ed8; }
  #successMsg {
    opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
  }
  #successMsg.show {
    opacity: 1; pointer-events: auto;
  }
  #submitForm { transition: opacity 0.4s ease; }
  .country-dropdown {
    position: absolute; z-index: 50; background: white; border: 1px solid #cbd5e1;
    border-radius: 0.5rem; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    max-height: 20rem; overflow-y: auto; width: 100%; margin-top: 0.25rem;
  }
  .country-group-header {
    background: #f1f5f9; padding: 0.5rem 0.75rem; font-weight: 600; 
    font-size: 0.75rem; color: #475569;
  }
  .country-option {
    padding: 0.5rem 0.75rem; cursor: pointer; display: flex; justify-content: space-between;
  }
  .country-option:hover { background: #f1f5f9; }
  .hidden { display: none !important; }

</head>
<body class="flex flex-col py-10 px-4 sm:px-6 lg:px-8">

  <div class="max-w-4xl w-full mx-auto relative">

    <!-- Success Message Overlay -->
    <div id="successMsg" class="absolute inset-0 z-20 flex-col items-center justify-center bg-white/95 backdrop-blur-sm rounded-xl border border-slate-200 shadow-xl p-10 text-center flex hidden">
      <div class="w-16 h-16 bg-green-100 rounded-full flex items-center justify-center text-green-600 mb-6 text-2xl font-bold">✓</div>
      <h3 class="text-2xl font-bold text-slate-800 mb-2">提交成功</h3>
      <p class="text-slate-500 max-w-md mx-auto mb-8">您的岗位已提交，正在等待管理员审核。审核通过后将立即上线。</p>
      <button onclick="location.reload()" class="btn btn-primary shadow-sm px-8">再提交一个</button>
    </div>

    <!-- Header -->
    <div class="text-center mb-10">
      <h2 class="text-3xl font-bold text-slate-900 tracking-tight">发布新岗位</h2>
      <p class="mt-2 text-slate-500">在 GPTJobs 网络中触达最优秀的候选人。</p>
    </div>

    <!-- Main Card -->
    <div class="bg-white border border-slate-200 shadow-sm rounded-xl overflow-hidden relative z-10 transition-opacity" id="formContainer">
       <div class="px-8 py-6 border-b border-slate-100 bg-slate-50">
          <h3 class="font-semibold text-slate-800">岗位信息</h3>
          <p class="text-sm text-slate-500">请提供准确的职位信息。</p>
       </div>

       <form id="submitForm" class="p-8 space-y-8">

         <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div>
              <label class="form-label">岗位名称 <span class="text-red-500">*</span></label>
              <input id="title" required class="form-input" placeholder="例如：高级软件工程师">
            </div>
            <div>
              <label class="form-label">公司名称 <span class="text-red-500">*</span></label>
              <input id="company_name" required class="form-input" placeholder="例如：某某科技">
            </div>
         </div>

         <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="relative md:col-span-1">
              <label class="form-label">国家 <span class="text-red-500">*</span></label>
              <input id="countrySearch" type="text" required class="form-input" 
                     placeholder="点击选择或搜索..." autocomplete="off"
                     onclick="showAllCountries()" oninput="filterCountries(this.value)">
              <input type="hidden" id="countryCode">
              <div id="countryDropdown" class="country-dropdown hidden"></div>
            </div>
            <div>
              <label class="form-label">城市</label>
              <input id="city" class="form-input" placeholder="可选">
            </div>
            <div>
              <label class="form-label">薪资 / 待遇 <span class="text-red-500">*</span></label>
              <input id="salary" required class="form-input" placeholder="如：35k-50k 或 $5000/month">
            </div>
         </div>

         <div class="pt-6 border-t border-slate-100">
            <div class="mb-4">
              <h3 class="font-semibold text-slate-800">要求与描述</h3>
            </div>
            <div class="space-y-6">
              <div>
                <label class="form-label">岗位描述 <span class="text-red-500">*</span></label>
                <textarea id="description" rows="4" required class="form-input resize-y" placeholder="请描述该职位..."></textarea>
              </div>
              <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                  <label class="form-label">岗位要求（每行一条）</label>
                  <textarea id="requirements" rows="4" class="form-input resize-y placeholder-slate-300" placeholder="- 3年以上经验&#10;- 精通 React"></textarea>
                </div>
                <div>
                   <label class="form-label">岗位职责（每行一条）</label>
                   <textarea id="responsibilities" rows="4" class="form-input resize-y placeholder-slate-300" placeholder="- 构建可扩展的 UI 组件&#10;- 指导初级开发者"></textarea>
                </div>
              </div>
            </div>
         </div>

         <div class="pt-6 border-t border-slate-100">
            <div class="mb-4">
              <h3 class="font-semibold text-slate-800">申请设置</h3>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
               <div class="md:col-span-4 relative">
                 <label class="form-label">工作类型</label>
                 <select id="job_type" class="form-input pr-10">
                   <option value="Full-time">全职</option><option value="Part-time">兼职</option><option value="Contract">合同</option>
                 </select>
                 <div class="form-select-caret">▼</div>
               </div>
               <div class="md:col-span-4 relative">
                  <label class="form-label">联系平台</label>
                  <select id="contact_platform" class="form-input pr-10">
                    <option value="whatsapp">WhatsApp</option><option value="telegram">Telegram</option><option value="email">邮件</option><option value="external_url">外部链接</option>
                  </select>
                  <div class="form-select-caret">▼</div>
               </div>
               <div class="md:col-span-4">
                  <label class="form-label">联系链接 <span class="text-red-500">*</span></label>
                  <input id="contact_link" required class="form-input" placeholder="例如：https://wa.me/...">
               </div>
               <div class="md:col-span-12">
                  <label class="form-label">标签（逗号分隔）</label>
                  <input id="tags" class="form-input" placeholder="例如：远程, 工程师, 高级">
               </div>
            </div>
         </div>

         <div class="pt-4 flex justify-end">
            <button type="submit" class="btn btn-primary w-full sm:w-auto px-8 shadow-sm">
               <span id="btnText">提交岗位</span>
               <span id="btnLoader" class="hidden">⏳</span>
            </button>
         </div>

       </form>
    </div>
  </div>

// Country dropdown functions
function showAllCountries() {
  const dropdown = document.getElementById('countryDropdown');
  const regions = [...new Set(COUNTRIES.map(c => c.region))];
  
  let html = '';
  regions.forEach(region => {
    const regionCountries = COUNTRIES.filter(c => c.region === region);
    html += `<div class="country-group">
      <div class="country-group-header">${region}</div>
      ${regionCountries.map(c => `
        <div onclick="selectCountry('${c.code}', '${c.name}')" class="country-option">
          <span class="font-medium">${c.name}</span>
          <span class="text-slate-400 text-sm">${c.code}</span>
        </div>
      `).join('')}
    </div>`;
  });
  
  dropdown.innerHTML = html;
  dropdown.classList.remove('hidden');
}

function filterCountries(query) {
  const dropdown = document.getElementById('countryDropdown');
  const q = query.toLowerCase().trim();
  
  if (!q) {
    showAllCountries();
    return;
  }
  
  const matches = COUNTRIES.filter(c => 
    c.name.toLowerCase().includes(q) || 
    c.pinyin.includes(q) || 
    c.code.toLowerCase().includes(q) ||
    c.en.toLowerCase().includes(q)
  );
  
  if (matches.length === 0) {
    dropdown.innerHTML = `<div class="p-3 text-slate-400 text-sm">未找到匹配的国家</div>`;
    dropdown.classList.remove('hidden');
    return;
  }
  
  const regions = [...new Set(matches.map(c => c.region))];
  let html = '';
  regions.forEach(region => {
    const regionCountries = matches.filter(c => c.region === region);
    html += `<div class="country-group">
      <div class="country-group-header">${region}</div>
      ${regionCountries.map(c => `
        <div onclick="selectCountry('${c.code}', '${c.name}')" class="country-option">
          <span class="font-medium">${c.name}</span>
          <span class="text-slate-400 text-sm">${c.code}</span>
        </div>
      `).join('')}
    </div>`;
  });
  
  dropdown.innerHTML = html;
  dropdown.classList.remove('hidden');
}

function selectCountry(code, name) {
  document.getElementById('countrySearch').value = name;
  document.getElementById('countryCode').value = code;
  document.getElementById('countryDropdown').classList.add('hidden');
}

// Close dropdown when clicking outside
document.addEventListener('click', function(e) {
  const container = document.querySelector('.relative.md\\:col-span-1');
  if (container && !container.contains(e.target)) {
    document.getElementById('countryDropdown').classList.add('hidden');
  }
});

// Form submission
document.getElementById('submitForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const submitBtn = e.target.querySelector('button[type="submit"]');
  const txtSpan = document.getElementById('btnText');
  const loader = document.getElementById('btnLoader');

  txtSpan.innerText = '提交中...';
  loader.classList.remove('hidden');
  submitBtn.disabled = true; 
  submitBtn.classList.add('opacity-80', 'cursor-not-allowed');

  const getLines = (id) => document.getElementById(id).value.split('\n').map(s=>s.trim()).filter(Boolean);

  const body = {
    title: document.getElementById('title').value,
    company_name: document.getElementById('company_name').value,
    country: document.getElementById('countryCode').value || document.getElementById('countrySearch').value,
    city: document.getElementById('city').value,
    salary: document.getElementById('salary').value,
    job_type: document.getElementById('job_type').value,
    contact_platform: document.getElementById('contact_platform').value,
    contact_link: document.getElementById('contact_link').value,
    description: document.getElementById('description').value,
    requirements: getLines('requirements'),
    responsibilities: getLines('responsibilities'),
    tags: document.getElementById('tags').value.split(',').map(s => s.trim()).filter(Boolean),
    status: 'pending', 
    report_enabled: true,
  };

  try {
    const res = await fetch('/api/admin/jobs', { 
      method: 'POST', 
      headers: { 'Content-Type': 'application/json' }, 
      body: JSON.stringify(body) 
    });
    const json = await res.json().catch(()=>({}));
    if (!res.ok) {
      alert(json.message || '提交失败，请重试。');
    } else {
      setTimeout(() => {
        document.getElementById('formContainer').style.opacity = '0';
        setTimeout(() => {
           document.getElementById('successMsg').classList.remove('hidden');
           document.getElementById('successMsg').classList.add('show');
        }, 400);
      }, 300);
    }
  } catch (err) {
    alert('网络错误，请重试。');
  } finally {
    if(document.getElementById('formContainer').style.opacity !== '0') {
      txtSpan.innerText = '提交岗位';
      loader.classList.add('hidden');
      submitBtn.disabled = false; 
      submitBtn.classList.remove('opacity-80', 'cursor-not-allowed');
    }
  }
});
</script>
